# Copyparty default configuration.
# Serves /data/root (the bind-mounted data volume) read-only.
# For authentication, custom mounts, or write access, create
# filez/config-personal/copyparty.conf with your settings.

[global]
  e2dsa
  e2ts
  ansi
  ver
  name: Filez
  xff-hdr: x-forwarded-for
  xff-src: lan
  rproxy: -1

[/]
  /data/root
  accs:
    r: *
