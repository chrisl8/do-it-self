services:
  voidship:
    container_name: voidship
    user: 1000:1000
    build: .
    volumes:
      - ${HOME}/voidship_ephemeral/dist:/app/dist:ro
    networks:
      - caddy-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"require('http').get('http://127.0.0.1:8080/', r => { let d=''; r.on('data', c => d+=c); r.on('end', () => process.exit(d.includes('Luminous Worlds') ? 0 : 1)); }).on('error', () => process.exit(1))\"",
        ]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 30s
      retries: 5
    restart: on-failure
networks:
  caddy-net:
    external: true
