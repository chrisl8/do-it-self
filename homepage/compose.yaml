services:
  homepage:
    image: ghcr.io/gethomepage/homepage
    container_name: homepage
    user: 1000:1000
    # This must be the ID of the Docker group.
    group_add:
      - ${DOCKER_GID:-985}
    volumes:
      - ./config:/app/config # Make sure your local config directory exists
      - ./images:/app/public/images
      - ./icons:/app/public/icons
      - ./dashboard-icons:/app/public/dashboard-icons
      - /var/run/docker.sock:/var/run/docker.sock # pass local proxy
      # To allow homepage to show disk space free on all disks I have an empty folder on each disk that I mount here.
      - ${MONITOR_ROOT:-/mnt/120}/for-homepage:/mnt/120
      - ${CACHE_ROOT:-/mnt/250}/for-homepage:/mnt/250
      - ${DATA_ROOT:-/mnt/2000}/for-homepage:/mnt/2000
      - ${MEDIA_ROOT:-/mnt/22TB}/for-homepage:/mnt/22TB
    networks:
      - homepage-net
    environment:
      HOMEPAGE_ALLOWED_HOSTS: console.${TS_DOMAIN}
    # healthcheck: is built into this app, no need to add one.
    restart: on-failure
  ts:
    container_name: homepage-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=console
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    networks:
      - homepage-net
    depends_on:
      homepage:
        condition: service_healthy
    restart: on-failure
networks:
  homepage-net:
