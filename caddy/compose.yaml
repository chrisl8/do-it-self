services:
  caddy:
    container_name: caddy
    user: 1000:1000
    image: caddy
    ports:
      - 80:80
    volumes:
      - ${VOL_CADDY_CONF:-~/container-data}/container-mounts/caddy/conf:/etc/caddy
      - ${VOL_CADDY_SITE:-~/container-data}/container-mounts/caddy/site:/srv
      - ${VOL_CADDY_DATA:-~/container-data}/container-mounts/caddy/data:/data
      - ${VOL_CADDY_CONFIG:-~/container-data}/container-mounts/caddy/config:/config
      - ${VOL_CADDY_LOGS:-~/container-data}/container-mounts/caddy/logs:/var/log/caddy
      - ${HOME}/voidship_ephemeral/dist/admin:/srv/voidship-admin:ro
    networks:
      - caddy-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO - https://www.lofland.com/ | grep -q 'Ekpyrotic Frood Landing Page'",
        ]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 30s
      retries: 5
    restart: on-failure
networks:
  caddy-net:
    external: true
