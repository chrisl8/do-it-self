# Container Configuration Registry
# Source of truth for what each container needs to run.
# User-specific values go in user-config.yaml (gitignored).

shared_variables:
  DATA_ROOT:
    type: path
    description: "Primary data storage root for container mounts"
    default: "~/container-data"
    required: true
  MEDIA_ROOT:
    type: path
    description: "Large media storage (movies, TV, downloads, backups)"
    default: "${DATA_ROOT}"
  CACHE_ROOT:
    type: path
    description: "Fast storage for caches and temporary data"
    default: "${DATA_ROOT}"
  MONITOR_ROOT:
    type: path
    description: "Monitored filesystem mount point"
    default: "${DATA_ROOT}"
  TS_AUTHKEY:
    type: secret
    description: "Tailscale authentication key for container networking"
    required: true
  TS_DOMAIN:
    type: string
    description: "Your Tailscale domain (e.g. tail1234.ts.net)"
    required: true
  HOST_NAME:
    type: string
    description: "This server's hostname on the Tailnet"
    default: ""
  DOCKER_GID:
    type: number
    description: "GID of the docker group on the host (for socket access)"
    default: "985"

categories:
  desktop-apps:
    label: "Desktop Apps"
  favorites:
    label: "Favorites"
  home:
    label: "Home"
  kanboard:
    label: "KanBoard"
