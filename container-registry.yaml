shared_variables:
  TS_AUTHKEY:
    type: secret
    description: Tailscale authentication key for container networking. Stored in Infisical at /shared/TS_AUTHKEY only -- never written to user-config.yaml or any container .env file. Injected into the shell env at container start time by scripts/all-containers.sh.
    required: true
  TS_API_TOKEN:
    type: secret
    description: Tailscale API access token (tskey-api-...) for preflight checks. Used by setup.sh, all-containers.sh, and the web admin to validate ACL, auth key, and tailnet config before starting sidecars.
  TS_DOMAIN:
    type: string
    description: Your Tailscale domain (e.g. tail1234.ts.net). Stored in Infisical at /shared/TS_DOMAIN only -- never written to user-config.yaml or any container .env file. Injected into the shell env at container start time by scripts/all-containers.sh.
    required: true
  HOST_NAME:
    type: string
    description: This server's hostname on the Tailnet. Stored in Infisical at /shared/HOST_NAME only -- never written to user-config.yaml or any container .env file. Injected into the shell env at container start time by scripts/all-containers.sh.
    default: ""
  DOCKER_GID:
    type: number
    description: GID of the docker group on the host (for socket access). Stored in Infisical at /shared/DOCKER_GID only -- never written to user-config.yaml or any container .env file. Injected into the shell env at container start time by scripts/all-containers.sh.
    default: "985"
