# Known module repositories for the do-it-self container platform.
# Users can add custom sources via `scripts/module.sh add-source <url>`.
# See docs/MODULES.md for the full module system design.
#
# These two repos contain all containers. They may be split into
# category-based repos (core, media, tools, etc.) in the future.
catalogs:
  do-it-self-containers:
    url: https://github.com/chrisl8/do-it-self-containers.git
    description: All generally-useful self-hosted container stacks
    required: true
  do-it-self-personal:
    url: https://github.com/chrisl8/do-it-self-personal.git
    description: Personal container stacks (maintainer-specific)
