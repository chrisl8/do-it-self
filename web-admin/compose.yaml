services:
  ts:
    container_name: web-admin-ts
    image: tailscale/tailscale
    environment:
      - TS_HOSTNAME=admin
      - TS_EXTRA_ARGS=--advertise-tags=tag:container
      - TS_SERVE_CONFIG=/config/tailscale-config.json
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_ENABLE_HEALTH_CHECK=true
      - TS_LOCAL_ADDR_PORT=127.0.0.1:9002
      - TS_AUTHKEY=${TS_AUTHKEY}
    volumes:
      - ./tailscale-state:/var/lib/tailscale
      - ./tailscale-config:/config
      - /dev/net/tun:/dev/net/tun
    # The web-admin backend itself is a PM2 process on the host, bound to
    # 127.0.0.1:3333. host-gateway resolves host.docker.internal to the
    # host's docker bridge IP from inside the container, giving this
    # sidecar the *only* network path to the backend. Nothing on the
    # public internet, the LAN, or any other tailnet device can reach the
    # backend except through Tailscale Serve on this sidecar.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    cap_add:
      - net_admin
      - sys_module
    # https://github.com/tailscale/tailscale/issues/12758#issuecomment-2564770640
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:9002/healthz"]
      start_period: 120s
      start_interval: 5s
      interval: 5m
      timeout: 5s
      retries: 3
    restart: on-failure
