# Kopia backup freshness check configuration
# Sourced by kopia-backup-check.sh

# Container to check (only the primary instance)
KOPIA_CONTAINER="kopia"

# Staleness threshold in hours
KOPIA_STALE_HOURS=62

# Status file served by Homepage dashboard
KOPIA_STATUS_DIR="${HOME}/containers/homepage/images"
KOPIA_STATUS_FILE="${KOPIA_STATUS_DIR}/kopia-status.json"

# Lock file to prevent concurrent runs
KOPIA_LOCK_FILE="/tmp/kopia-backup-check.lock"

# Log file
KOPIA_LOG_FILE="${HOME}/logs/kopia-backup-check.log"

# Web admin URL for backup status page (included in failure output)
# Constructed after 1Password loads TS_DOMAIN — see kopia-backup-check.sh
KOPIA_WEB_ADMIN_URL=""

# Hosts to ignore when checking for stale backups
# These hosts still appear in output but stale snapshots won't trigger alerts
KOPIA_IGNORE_HOSTS=()
