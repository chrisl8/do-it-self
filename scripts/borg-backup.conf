# BorgBackup configuration
# Sourced by borg-backup.sh and related scripts

# Repository location
BORG_REPO="/mnt/22TB/borg-repo"

# Compression algorithm — local (lz4 = fast, good for local disk)
BORG_COMPRESSION="lz4"
# Remote compression — higher ratio to reduce transfer size and Pi storage
BORG_REMOTE_COMPRESSION="zstd,3"

# Exclusion patterns file
BORG_EXCLUDE_FILE="${HOME}/containers/borgbackup/exclude-patterns.txt"

# Database dump directory
BORG_DB_DUMP_DIR="/mnt/22TB/borg-db-dumps"

# Status file served by Homepage dashboard
BORG_STATUS_DIR="${HOME}/containers/homepage/images"
BORG_STATUS_FILE="${BORG_STATUS_DIR}/borg-status.json"

# Web admin URL for backup status page (included in failure output)
# Constructed after 1Password loads TS_DOMAIN — see borg-backup.sh
BORG_WEB_ADMIN_URL=""

# Lock file to prevent concurrent runs
BORG_LOCK_FILE="/tmp/borg-backup.lock"

# Log file
BORG_LOG_FILE="${HOME}/logs/borg-backup.log"

# Retention policy
BORG_KEEP_DAILY=7
BORG_KEEP_WEEKLY=4
BORG_KEEP_MONTHLY=6
BORG_KEEP_YEARLY=2

# Paths to back up
BORG_BACKUP_PATHS=(
    "/mnt/2000/container-mounts/"
    "/mnt/250/container-mounts/"
    "/mnt/22TB/container-mounts/recon/data/media/comics/"
    "/mnt/22TB/container-mounts/recon/data/media/ebooks/"
    "/mnt/22TB/container-mounts/recon/data/media/manga/"
    "/mnt/22TB/container-mounts/recon/data/media/music/"
    "/mnt/22TB/container-mounts/filez/"
    "/mnt/22TB/borg-db-dumps/"
    "/mnt/2000/samba/"
    "/mnt/2000/FastmailBackup/"
    "${HOME}/"
    "/etc/"
)

# ── Remote (offsite) backup ──────────────────────────────────────
# Leave BORG_REMOTE_REPO empty to disable remote backup
BORG_REMOTE_REPO="ssh://borg@backup-pi/mnt/backup/borg"
# Example: BORG_REMOTE_REPO="ssh://piadmin@backup-pi/mnt/backup/borg-repo"

# DR-focused retention — fewer dailies (local repo handles deleted-file recovery)
BORG_REMOTE_KEEP_DAILY=3
BORG_REMOTE_KEEP_WEEKLY=4
BORG_REMOTE_KEEP_MONTHLY=12
BORG_REMOTE_KEEP_YEARLY=5

# Rate limit for remote transfers in kB/s (0 = unlimited)
# Set to e.g. 5000 once the Pi is offsite to avoid saturating the uplink
BORG_REMOTE_RATELIMIT=0

# SSH command for borg remote connections
# BatchMode=yes: fail immediately instead of prompting for passwords
# StrictHostKeyChecking=accept-new: auto-accept unknown keys, reject changed keys
BORG_RSH="ssh -o BatchMode=yes -o StrictHostKeyChecking=accept-new"
