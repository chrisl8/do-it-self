# logrotate config for ~chrisl8/logs/borg-pi-manage.log
#
# Install on neuromancer:
#   sudo install -m 0644 -o root -g root \
#     ~/containers/scripts/logrotate-borg-pi-manage.conf \
#     /etc/logrotate.d/borg-pi-manage
#
# Daily cron writes a few KB; weekly rotation with 12 archives keeps
# ~3 months of history at modest disk cost. `copytruncate` is safe for
# the `tee -a` write pattern in borg-pi-manage.sh — the file inode is
# preserved so any in-flight tee FD keeps writing into the (now-empty)
# original file rather than the rotated copy.

/home/chrisl8/logs/borg-pi-manage.log {
    weekly
    rotate 12
    compress
    delaycompress
    missingok
    notifempty
    copytruncate
    su chrisl8 chrisl8
}
