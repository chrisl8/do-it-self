; CouchDB local config for Obsidian LiveSync.
; Admin credentials come from COUCHDB_USER/COUCHDB_PASSWORD env vars
; (set via Infisical). CouchDB auto-generates the admin hash and UUID
; on first boot — do NOT hardcode them here.
;
; For personal overrides, create
; obsidian-babel-livesync/config-personal/docker.ini

[chttpd]
require_valid_user = true
max_http_request_size = 4294967296

[chttpd_auth]
require_valid_user = true

[httpd]
WWW-Authenticate = Basic realm="couchdb"
enable_cors = true

[couchdb]
max_document_size = 50000000

[cors]
credentials = true
origins = app://obsidian.md,capacitor://localhost,http://localhost
